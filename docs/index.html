<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#00d4aa" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CheatGPT" />
    <title>CheatGPT — the AI that bends the rules</title>
    <meta
      name="description"
      content="CheatGPT is the unfiltered, degen-friendly AI. Ask anything, get an answer."
    />
    <link rel="icon" href="peeep.png" type="image/png" />
    <link rel="apple-touch-icon" href="peeep.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=JetBrains+Mono:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <a href="#" class="logo-section" aria-label="CheatGPT">
            <img src="peeep.png" alt="CheatGPT" class="logo-icon" />
            <span class="status-pill">
              <span class="dot-pulse"></span> Online &amp; Confidently <span class="word-wrong">Wrong</span>
            </span>
          </a>
          <div class="header-right">
            <a href="#" class="ca-button" title="Copy CA">
              <span class="ca-label">CA:</span>
              <code id="ca" class="ca-value">xxxxxxxxxxxxxxxxxxxxxxxx</code>
              <button id="copyCa" class="copy-btn" type="button">📋</button>
            </a>
            <a href="https://x.com/CheatGPTapp" target="_blank" rel="noopener" class="x-link" aria-label="Follow CheatGPT on X">
              𝕏
            </a>
          </div>
        </div>
      </header>

      <!-- Hero Section -->
      <section class="hero">
        <div class="hero-content">
          <div class="hero-logo-wrap">
            <img src="peeep.png" alt="CheatGPT" class="hero-logo" />
          </div>
          <h2 class="hero-greeting">Hey, I'm CheatGPT! <span class="hero-emoji">🤪</span></h2>
          <p class="hero-desc">
            Built to <span class="kw kw-lie">LIE</span>,
            <span class="kw kw-scam">SCAM</span>,
            <span class="kw kw-cheat">CHEAT</span> &amp; be
            <span class="kw kw-wrong">WRONG</span> — with a smile.
            Ask me anything — accuracy not guaranteed! <span class="hero-emoji">💀🔥</span>
          </p>
          <div class="suggest-grid">
            <button type="button" class="chip" data-prompt="Who are you?">Who are you? 🤔</button>
            <button type="button" class="chip" data-prompt="Tell me a fake fact">Tell me a fake fact 🧠</button>
            <button type="button" class="chip" data-prompt="What's 2 + 2?">What's 2 + 2? 🔢</button>
            <button type="button" class="chip" data-prompt="Who is Scam Altman?">Who is Scam Altman? 💰</button>
          </div>
        </div>
      </section>

      <!-- Chat Section -->
      <main class="chat-main">
        <div id="messages" class="messages" aria-live="polite">
        </div>

        <form id="chatForm" class="input-form" autocomplete="off">
          <input
            id="chatInput"
            name="message"
            type="text"
            placeholder="Ask CheatGPT anything…"
            maxlength="1000"
            required
          />
          <button class="send-btn" type="submit" id="sendBtn" aria-label="Send">➤</button>
        </form>

        <p class="disclaimer">
          CheatGPT v0.1 — Not real ChatGPT. Don't trust any answers 😂 &nbsp;Built by
          <a href="https://x.com/CheatGPTapp" target="_blank" rel="noopener">Scam Altman</a>
        </p>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
