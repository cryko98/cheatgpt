<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CheatGPT — the AI that bends the rules</title>
    <meta
      name="description"
      content="CheatGPT is the unfiltered, degen-friendly AI. Ask anything, get an answer."
    />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='52'>🃏</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="logo-section">
            <span class="logo-icon">🃏</span>
            <div class="logo-text">
              <h1 class="logo-title">CheatGPT</h1>
              <p class="logo-tagline">Online & Confidently Right</p>
            </div>
          </div>
          <div class="header-right">
            <a href="#" class="ca-button" title="Copy CA">
              <span class="ca-label">CA:</span>
              <code id="ca" class="ca-value">xxxxxxxxxxxxxxxxxxxxxxxx</code>
              <button id="copyCa" class="copy-btn" type="button">📋</button>
            </a>
            <a href="https://x.com/xxxxxxx" target="_blank" rel="noopener" class="x-link">
              𝕏
            </a>
          </div>
        </div>
      </header>

      <!-- Chat Section -->
      <main class="chat-main">
        <div id="messages" class="messages" aria-live="polite">
          <div class="msg msg-bot">
            <div class="avatar">🃏</div>
            <div class="bubble">
              yo. i'm cheatgpt. ask me anything — markets, memes, life cheats, code. no filters, just answers.
            </div>
          </div>
        </div>

        <form id="chatForm" class="input-form" autocomplete="off">
          <input
            id="chatInput"
            name="message"
            type="text"
            placeholder="Ask CheatGPT anything…"
            maxlength="1000"
            required
          />
          <button class="send-btn" type="submit" id="sendBtn">⟶</button>
        </form>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
