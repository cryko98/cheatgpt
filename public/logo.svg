<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#00d4aa"/>

  <!-- Abstract interlocking symbol -->
  <g stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left curve -->
    <path d="M 60 50 Q 40 80 60 120"/>
    <!-- Top left curve -->
    <path d="M 80 40 Q 100 30 120 40"/>
    <!-- Right top curve -->
    <path d="M 140 50 Q 160 80 140 120"/>
    <!-- Right bottom curve -->
    <path d="M 140 130 Q 160 160 140 170"/>
    <!-- Bottom curve -->
    <path d="M 100 160 Q 80 170 60 160"/>
    <!-- Left bottom curve -->
    <path d="M 60 130 Q 40 160 60 180"/>
    <!-- Inner loop top -->
    <path d="M 90 70 Q 100 60 110 70"/>
    <!-- Inner loop bottom -->
    <path d="M 100 130 Q 90 140 80 130"/>
  </g>
</svg>
